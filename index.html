<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヒアリングチェックアプリ</title>
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <h1>ヒアリングチェック</h1>

    <!-- チェックリスト -->
    <div id="checklist">
        <label><input type="checkbox" value="業務が属人化している"> 業務が属人化している</label><br>
        <label><input type="checkbox" value="マニュアルが整備されていない"> マニュアルが整備されていない</label><br>
        <label><input type="checkbox" value="情報共有に時間がかかる"> 情報共有に時間がかかる</label><br>
        <label><input type="checkbox" value="紙の書類が多い"> 紙の書類が多い</label><br>
        <label><input type="checkbox" value="問い合わせ対応が多い"> 問い合わせ対応が多い</label><br>
    </div>

    <button id="makeProposal">提案書を作る</button>

    <h2>提案書</h2>
    <div id="result"></div>

    <hr>

    <!-- AI改善案ボタン -->
    <button id="improveBtn">AIで改善案を作る</button>

    <!-- AI改善案の表示エリア -->
    <h2>AI改善案</h2>
    <div id="improveResult"></div>

    <script>
        const API_KEY = "YOUR_API_KEY_HERE";  // ← あなたの OpenAI APIキーを入れる

        // 提案書生成
        document.getElementById("makeProposal").addEventListener("click", () => {
            const checks = document.querySelectorAll("#checklist input:checked");
            let text = "【ヒアリング結果】\n\n";

            checks.forEach(c => {
                text += "- " + c.value + "\n";
            });

            document.getElementById("result").innerText = text;
        });

        // AI改善案生成
        document.getElementById("improveBtn").addEventListener("click", async () => {
            const checklistText = document.getElementById("result").innerText;

            const prompt = `
あなたは中小企業の業務改善コンサルタントです。
以下のチェック結果に基づき、改善ポイントと改善方法を簡潔に提案してください。

【チェック結果】
${checklistText}

【出力形式】
- 改善ポイント
- 改善方法（AIを使った改善を中心に）
`;

            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            document.getElementById("improveResult").innerText =
                data.choices[0].message.content;
        });
    </script>
</body>
</html>
